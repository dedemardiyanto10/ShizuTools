name: Update Version Manifest

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process Data
        id: get_data
        run: |
          # 1. Ambil data Release
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_JSON='${{ toJson(github.event.release) }}'
          else
            RELEASE_JSON=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/releases/latest)
          fi

          # 2. Version Code Logic (Safe default)
          V_CODE=1
          F_UPDATE=false
          if [ -f "update.json" ]; then
            V_CODE=$(jq -r '.versionCode // 0' update.json)
            V_CODE=$((V_CODE + 1))
            F_UPDATE=$(jq -r '.isForceUpdate // false' update.json)
          fi

          # 3. Tag & Name
          TAG_NAME=$(echo "$RELEASE_JSON" | jq -r '.tag_name // "v1.0.0"')
          VERSION_NAME=$(echo $TAG_NAME | sed 's/[vV]//g')
          
          # 4. Asset APK (Filter lebih kuat)
          APK_INFO=$(echo "$RELEASE_JSON" | jq -r '.assets[]? | select(.name | endswith(".apk")) | "\(.browser_download_url)|\(.size)"' | head -n 1)
          
          if [ -z "$APK_INFO" ]; then
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/latest"
            FILE_SIZE="-- MB"
          else
            DOWNLOAD_URL=$(echo $APK_INFO | cut -d'|' -f1)
            SIZE_BYTES=$(echo $APK_INFO | cut -d'|' -f2)
            FILE_SIZE=$(awk "BEGIN {printf \"%.1f MB\", $SIZE_BYTES/1048576}")
          fi
          
          # 5. Ambil Changelog (Gunakan delimiter unik agar tidak bentrok dengan teks)
          CHANGELOG_TEXT=$(echo "$RELEASE_JSON" | jq -r '.body // "Pembaruan sistem terbaru"')

          # Set Outputs
          echo "v_code=$V_CODE" >> $GITHUB_OUTPUT
          echo "f_update=$F_UPDATE" >> $GITHUB_OUTPUT
          echo "v_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "d_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "f_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "date=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT
          
          # Fix for multi-line strings in GitHub Actions
          echo "c_log<<GH_EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_TEXT" >> $GITHUB_OUTPUT
          echo "GH_EOF" >> $GITHUB_OUTPUT

      - name: Generate update.json
        run: |
          # Menggunakan file sementara untuk keamanan data
          jq -n \
            --arg v_code "${{ steps.get_data.outputs.v_code }}" \
            --arg v_name "${{ steps.get_data.outputs.v_name }}" \
            --arg date "${{ steps.get_data.outputs.date }}" \
            --arg d_url "${{ steps.get_data.outputs.d_url }}" \
            --arg c_log "${{ steps.get_data.outputs.c_log }}" \
            --arg f_size "${{ steps.get_data.outputs.f_size }}" \
            --argjson f_update ${{ steps.get_data.outputs.f_update }} \
            '{
              versionCode: ($v_code | tonumber),
              versionName: $v_name,
              updateDate: $date,
              downloadUrl: $d_url,
              changelog: $c_log,
              fileSize: $f_size,
              releaseType: "Official Release",
              isForceUpdate: $f_update
            }' > update.json

      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add update.json
          
          # Cek jika benar-benar ada perubahan agar tidak loop/error
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update update.json [skip ci]"
            git push origin HEAD:main
          fi
